<!DOCTYPE html>
<html>
<head>
    <title>YT Downloader</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f4; }
        .container { background: white; padding: 20px; border-radius: 10px; max-width: 500px; margin: auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input { width: 80%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 12px 24px; background: #ff0000; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #res { margin-top: 20px; }
        img { width: 100%; border-radius: 10px; }
        .dl-link { display: block; background: #007bff; color: white; padding: 10px; margin: 5px 0; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>YouTube Downloader</h1>
        <input type="text" id="url" placeholder="Paste YouTube Link Here">
        <br>
        <button onclick="extractDetails()">Get Video Details</button>
        <div id="res"></div>
    </div>

    <script>
        async function extractDetails() {
            const urlValue = document.getElementById('url').value;
            const resDiv = document.getElementById('res');
            
            if(!urlValue) { alert("Please paste a link!"); return; }
            
            resDiv.innerHTML = "Processing... Please wait.";

            try {
                const response = await fetch('/extract', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlValue })
                });

                const data = await response.json();

                if (data.error) {
                    resDiv.innerHTML = "<p style='color:red;'>Error: " + data.error + "</p>";
                } else {
                    let html = `<h3>${data.title}</h3><img src="${data.thumbnail}">`;
                    data.formats.forEach(f => {
                        html += `<a href="${f.url}" target="_blank" class="dl-link">Download ${f.quality} (.${f.ext})</a>`;
                    });
                    resDiv.innerHTML = html;
                }
            } catch (err) {
                resDiv.innerHTML = "<p style='color:red;'>Server connect nahi ho raha. Logs check karein.</p>";
            }
        }
    </script>
</body>
</html>
